<!doctype html><html lang="en"><head><meta charset="utf-8"><style>
html,body{margin:0;height:100%;font-family:Arial,sans-serif;background:#07111f;color:white;overflow:hidden}
.frame{position:relative;height:100%;display:grid;place-items:center;background:linear-gradient(135deg,#101b32,#e3333e)}
.pulse{position:absolute;width:360px;height:360px;border-radius:50%;background:rgba(255,255,255,.12);animation:p 4s infinite}
.ticker{position:absolute;bottom:0;left:0;right:0;background:#fff;color:#111;padding:12px;font-weight:800;white-space:nowrap;animation:t 12s linear infinite}
h1{font-size:42px;margin:0;text-shadow:0 12px 28px rgba(0,0,0,.35)}p{font-size:18px}.play{width:88px;height:88px;border-radius:50%;background:#fff;display:grid;place-items:center;color:#e3333e;font-size:42px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
@keyframes p{0%{transform:scale(.7);opacity:.5}70%{transform:scale(1.35);opacity:.05}100%{opacity:0}}@keyframes t{from{transform:translateX(100%)}to{transform:translateX(-100%)}}</style></head>
<body><main class="frame"><div class="pulse"></div><section><div class="play">▶</div><h1>Khabari Video Brief</h1><p>Data, field reports, and expert context in sixty seconds.</p></section><div class="ticker">Markets steady • Monsoon teams on alert • AI policy review expands • Sports academies add analytics</div></main></body></html>
